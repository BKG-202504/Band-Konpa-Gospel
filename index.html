<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band Konpa</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
text-align:center;
padding:40px 20px;
}

nav{
background:#222;
padding:10px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
}

section{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

.admin-btn{
position:fixed;
bottom:20px;
right:20px;
background:#111;
color:white;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
}

#panel{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
overflow:auto;
padding:20px;
}
</style>
</head>

<body>

<header>
<h1 id="siteTitle">Band Konpa</h1>
<p id="siteDesc">Mizik • Adorasyon • Enspirasyon</p>
</header>

<nav>
<a href="#about">Sou Nou</a>
<a href="#music">Mizik</a>
<a href="#events">Evènman</a>
<a href="#contact">Kontak</a>
</nav>

<section id="about">
<div class="card">
<h2>Sou Nou</h2>
<p id="aboutText">Mete deskripsyon gwoup la isit.</p>
</div>
</section>

<section id="music">
<div class="card">
<h2>Mizik & Videyo</h2>
<p id="musicText">Ajoute mizik oswa videyo isit.</p>
</div>
</section>

<section id="events">
<div class="card">
<h2>Evènman</h2>
<p id="eventText">Ajoute evènman yo isit.</p>
</div>
</section>

<section id="contact">
<div class="card">
<h2>Kontak</h2>
<p id="contactText">Telefòn: +509 XXXXXXXX</p>

<a id="whatsappLink"
href="https://wa.me/50900000000"
target="_blank">
WhatsApp
</a>

</div>
</section>

<button class="admin-btn" onclick="login()">Admin</button>

<div id="panel">
<h2>Admin Panel</h2>

<label>Non Gwoup</label>
<input id="editTitle">

<label>Deskripsyon</label>
<input id="editDesc">

<label>Sou Nou</label>
<textarea id="editAbout"></textarea>

<label>Mizik</label>
<textarea id="editMusic"></textarea>

<label>Evènman</label>
<textarea id="editEvent"></textarea>

<label>Kontak</label>
<textarea id="editContact"></textarea>

<label>WhatsApp Link</label>
<input id="editWhatsapp">

<button onclick="saveData()">Sove</button>
<button onclick="closePanel()">Fèmen</button>
</div>

<script>

function login(){
let pass=prompt("Antre modpas");
if(pass==="BKG2025"){
openPanel();
}else{
alert("Modpas pa bon");
}
}

function openPanel(){

document.getElementById("panel").style.display="block";

document.getElementById("editTitle").value=
document.getElementById("siteTitle").innerText;

document.getElementById("editDesc").value=
document.getElementById("siteDesc").innerText;

document.getElementById("editAbout").value=
document.getElementById("aboutText").innerText;

document.getElementById("editMusic").value=
document.getElementById("musicText").innerText;

document.getElementById("editEvent").value=
document.getElementById("eventText").innerText;

document.getElementById("editContact").value=
document.getElementById("contactText").innerText;

document.getElementById("editWhatsapp").value=
document.getElementById("whatsappLink").href;
}

function closePanel(){
document.getElementById("panel").style.display="none";
}

function saveData(){

let nouvoNon = document.getElementById("editTitle").value;

document.getElementById("siteTitle").textContent = nouvoNon;

document.getElementById("siteDesc").textContent =
document.getElementById("editDesc").value;

document.getElementById("aboutText").textContent =
document.getElementById("editAbout").value;

document.getElementById("musicText").textContent =
document.getElementById("editMusic").value;

document.getElementById("eventText").textContent =
document.getElementById("editEvent").value;

document.getElementById("contactText").textContent =
document.getElementById("editContact").value;

document.getElementById("whatsappLink").href =
document.getElementById("editWhatsapp").value;

alert("Chanjman sove!");
closePanel();
}
